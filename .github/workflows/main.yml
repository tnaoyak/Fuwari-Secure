name: CI

on:
  push:
    branches: [ main ]
    tags:
    - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: [ macos-latest ]

    steps:
    - name: Select latest Xcode
      run: "sudo xcode-select -s /Applications/Xcode_13.2.app"
    - name: Install the Apple certificate and provisioning profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        # BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        # create variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # import certificate and provisioning profile from secrets
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
        #echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH

        # create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # import certificate to keychain
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # apply provisioning profile
        # mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        # cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

    - name: Install deps
      run: |
        brew install make create-dmg ripgrep
        echo "/usr/local/opt/make/libexec/gnubin" >> $GITHUB_PATH

    - uses: actions/checkout@v4

    - uses: actions/cache@v4
      id: carthage-cache
      with:
        path: Carthage
        key: ${{ runner.os }}-carthage-${{ hashFiles('**/Cartfile.resolved') }}

    - name: Carthage
      if: steps.carthage-cache.outputs.cache-hit != 'true'
      run: |
        carthage bootstrap --use-xcframeworks

    - name: Build and make dmg
      run: |
        make dmg

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Fuwari
        path: ./dist

  pre-release:
    needs: build
    runs-on: [ macos-latest ]
    if: "!startsWith(github.ref, 'refs/tags/v')"
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: Fuwari
        path: ./dist

    - uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        prerelease: true
        title: "Development Build"
        files: |
          dist/Fuwari.dmg

  release:
    needs: build
    runs-on: [ macos-latest ]
    if: "startsWith(github.ref, 'refs/tags/v')"
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: Fuwari
        path: ./dist

    - uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        prerelease: false
        files: |
          dist/Fuwari.dmg

    - name: Update Homebrew Cask
      env:
        TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      if: env.TAP_TOKEN != ''
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        SHA256=$(shasum -a 256 dist/Fuwari.dmg | awk '{print $1}')
        
        git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/tnaoyak/homebrew-tap.git homebrew-tap
        cd homebrew-tap
        
        mkdir -p Casks
        cat <<'EOF' | sed 's/^        //' > Casks/fuwari-secure.rb
        cask "fuwari-secure" do
          version "VERSION_PLACEHOLDER"
          sha256 "SHA256_PLACEHOLDER"

          url "https://github.com/tnaoyak/Fuwari-Secure/releases/download/v#{version}/Fuwari.dmg"
          name "Fuwari-Secure"
          desc "Floating screenshot like a sticky (Secure Edition)"
          homepage "https://github.com/tnaoyak/Fuwari-Secure"

          app "Fuwari-Secure.app"

          uninstall quit: "com.tnaoyak.Fuwari-Secure"

          zap trash: [
            "~/Library/Preferences/com.tnaoyak.Fuwari-Secure.plist",
            "~/Library/Caches/com.tnaoyak.Fuwari-Secure",
            "~/Library/Saved Application State/com.tnaoyak.Fuwari-Secure.savedState",
          ]

          caveats <<~EOS
            Fuwari-Secure is self-signed. If you see a message saying "Fuwari-Secure is damaged and cannot be opened", please run:
              xattr -cr /Applications/Fuwari-Secure.app
          EOS
        end
        EOF
        
        perl -pi -e "s/VERSION_PLACEHOLDER/${VERSION}/g" Casks/fuwari-secure.rb
        perl -pi -e "s/SHA256_PLACEHOLDER/${SHA256}/g" Casks/fuwari-secure.rb
        
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Casks/fuwari-secure.rb
        git commit -m "Update fuwari-secure to ${VERSION}"
        git push origin HEAD
